schemaVersion: 1
name: "srvcs-power"
slug: "power"
repository: "srvcs/power"
package: "srvcs-power"
function: "arithmetic: base raised to exp"
kind: "orchestrator"
categories:
  - "arithmetic"
dependencies:
  - slug: "multiply"
    service: "srvcs-multiply"
endpoints:
  - method: "GET"
    path: "/"
    purpose: "Service identity"
  - method: "POST"
    path: "/"
    purpose: "Evaluate the service function"
  - method: "GET"
    path: "/healthz"
    purpose: "Liveness probe"
  - method: "GET"
    path: "/readyz"
    purpose: "Readiness probe"
  - method: "GET"
    path: "/metrics"
    purpose: "Prometheus metrics"
  - method: "GET"
    path: "/openapi.json"
    purpose: "OpenAPI document"
inputs:
  - name: "base"
    type: "integer"
    required: true
  - name: "exp"
    type: "integer"
    required: true
outputs:
  - name: "base"
    type: "integer"
  - name: "exp"
    type: "integer"
  - name: "result"
    type: "integer"
configuration:
  - name: "SRVCS_BIND_ADDR"
    default: "0.0.0.0:8080"
    purpose: "Bind address"
  - name: "SRVCS_ENV"
    default: "development"
    purpose: "Environment label for logs"
  - name: "RUST_LOG"
    default: "info,tower_http=info"
    purpose: "Tracing filter"
  - name: "SRVCS_MULTIPLY_URL"
    default: "http://127.0.0.1:8086"
    purpose: "Base URL for srvcs-multiply"
